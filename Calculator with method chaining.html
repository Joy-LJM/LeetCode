<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      class Calculator {
        /**
         * @param {number} value
         */
        constructor(value) {
          this.res = value;
        }

        /**
         * @param {number} value
         * @return {Calculator}
         */
        add(value) {
          this.res += value;

          return this;
        }

        /**
         * @param {number} value
         * @return {Calculator}
         */
        subtract(value) {
          this.res -= value;
          return this;
        }

        /**
         * @param {number} value
         * @return {Calculator}
         */
        multiply(value) {
          this.res *= value;
          return this;
        }

        /**
         * @param {number} value
         * @return {Calculator}
         */
        divide(value) {
          if (value === 0) {
            throw new Error("Division by zero is not allowed");
          }
          this.res /= value;
          return this;
        }

        /**
         * @param {number} value
         * @return {Calculator}
         */
        power(value) {
          this.res = Math.pow(this.res, value);
          return this;
        }

        /**
         * @return {number}
         */
        getResult() {
          return this.res;
        }
      }
      const res = new Calculator(10).add(5).subtract(7).getResult();
      console.log(res);
    </script>
  </body>
</html>
