  <body>
    <script>
      function bubbleSort(array) {
        // Only change code below this line
        for (let i = 0; i < array.length; i++) { //loop through the entire array 
          for (let j = 0; j < array.length - 1-i; j++) { //loop through the array again, but reduce the length by i each time since the largest elements will be at the end of the array after each pass
            if (array[j] > array[j+1]) { ///compare adjacent elements
              let temp = array[j];
              array[j] = array[j+1];
              array[j+1] = temp;
              
            }
          }
        }
        return array;
        // Only change code above this line
      }
      console.log(bubbleSort([5, 3, 8, 4, 2])); // Output: [2, 3, 4, 5, 8]
    </script>
  </body>
