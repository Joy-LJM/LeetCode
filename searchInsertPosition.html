      // method 2
      const searchInsert=(nums,target)=>{
        const n=nums.length;
        for(let i=0;i<n;i++){
          if(nums[i]===target){
            return i
          }else if(nums[i]>target){
            return i
          }
        }
        return n;
      }
      console.log(searchInsert([1001], 5));
      console.log(searchInsert([1,3,5,6], 5));
    </script>
