      const isCircularSentence = (s) => {
        s = s.split(" ");
        s.push(s[0]);// push the first element into the last index,to compare the first element with the original last element

        for (let i = 0; i < s.length - 1; i++) {
          if (s[i].at(-1) !== s[i + 1].at(0)) return false;
        }
        return true;
      };
