<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var isValid = function (s) {
        const stack = [];
        const map = new Map([
          ["(", ")"],
          ["[", "]"],
          ["{", "}"],
        ]);
        for (let i = 0; i < s.length; i++) {
          if (map.has(s[i])) {
            stack.push(s[i]);
          } else {
            if (map.get(stack.pop()) !== s[i]) {
              return false;
            }
          }
        }
        return stack.length === 0;
      };
      console.log(isValid("(])"));
    </script>
  </body>
</html>
