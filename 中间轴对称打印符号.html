<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function printAsciiArt(n) {
        for (let i = 0; i < n; i++) {
          let str = "";
          for (let j = 0; j < n; j++) {
            if (j == i || j==n-i-1) {
              str += "*";
            } else {
              str += "-";
            }
          }
          console.log(str+"\n");
        }
        
      }
      printAsciiArt(5);
    </script>
  </body>
</html>
