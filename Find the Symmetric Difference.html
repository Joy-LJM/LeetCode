  <script>
    // Symmetric Difference 找到对称差: The mathematical term symmetric difference (△ or ⊕) of two sets is the set of elements which are in either of the two sets but not in both.

    // method 1
    const diff=(arr1,arr2)=>[...arr1.filter(e=>!arr2.includes(e)),...arr2.filter(e=>!arr1.includes(e))];

    const symDiff=(...args)=>[...new Set(args.reduce(diff))];
    console.log(symDiff([1,2,3],[2,3,4],[4,5,6])); // [1,5,6]
    // method 2
    function sym(...args){
      return [...args.reduce(reducer,new Set())];
    }


    function reducer(acc, curr){
      const newSet=new Set(curr);
      for(const el of acc){
        if(newSet.has(el)){
          newSet.delete(el);
        }else{
          newSet.add(el);
        }
      }
      return newSet;
    }
    console.log(sym([1,2,3],[2,3,4],[4,5,6])); // [1,5,6]

    // method 3 
    const evens=new Set([2,4,6,8]);
    const odds=new Set([1,3,4,5,8]);
    console.log(evens.symmetricDifference(odds)); // Set(4) { 2, 6, 1, 3, 5 }
  </script>
