  <body>
    <script>
      /**
       * @param {number[]} nums
       * @return {number}
       */
      var removeDuplicates = function (nums) {
        // const res=[];
        let j = 0;
        for (let i = 1; i < nums.length; i++) {
          if (nums[j] !== nums[i]) {
            j++;
            nums[j] = nums[i];
          }
        }

        return j;
      };
      console.log(removeDuplicates([1, 1, 2]));
    </script>
  </body>
