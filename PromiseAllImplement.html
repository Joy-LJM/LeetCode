<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function myAll(promises){
      return new Promise((resolve,reject)=>{
       const results = [];
       let completedPromises = 0;
       if(promises.length===0){
        resolve(results);
        return;
       }
       promises.forEach((promise,index)=>{
        Promise.resolve(promise).then(value=>{ // Wrap the promise in Promise.resolve to handle non-promise values, e.g., strings, numbers, etc.
          results[index]=value; // index is used to maintain the order of results ensuring that the results array is populated in the same order as the input promises.
          completedPromises++;
          if(completedPromises===promises.length){
            resolve(results);
          }
        }).catch(reject);
       })
      })
    }
    
    // Promise.race implementation
    function myRace(promises){
      return new Promises((resolve,reject)=>{
        promises.forEach(promise=>{
          Promise.resolve(promise).then(resolve).catch(reject)
        })
      })
    }
  </script>
</body>
</html>
