  <body>
    <script>
      // are these two parameters array?
      // would them be empty arrays?

      function mergeSortedArray(arr1, arr2) {
        // check input parameters

        const res = [...arr1, ...arr2];
        for (let i = 0; i < res.length; i++) {
          for (let j = i + 1; j < res.length; j++) {
            if (res[i] > res[j]) {
              const temp = res[i];
              res[i] = res[j];
              res[j] = temp;
            }
          }
        }
        return res;
        // return arr1.concat(arr2) .sort((a,b)=>a-b);
      }
      function mergeSortedArray2(arr1, arr2) {
        if (arr1.length === 0) return arr2;
        if (arr2.length === 0) return arr1;
        const mergeArr = [];
        let i = 1,
          j = 1;
        let arr1Item = arr1[0];
        let arr2Item = arr2[0];
        while (arr1Item || arr2Item) {
          // if arr2 is exhausted: arr2Item is undefined, take the next item from arr1.otherwise, compare arr1Item and arr2Item normally
          if (!arr2Item || arr1Item < arr2Item) {
            // when arr1 is exhausted,undefined < number => false, so we need to check if arr2Item is undefined first
            mergeArr.push(arr1Item);
            arr1Item = arr1[i];
            i++;
          } else {
            mergeArr.push(arr2Item);
            arr2Item = arr2[j];
            j++;
          }
        }
        return mergeArr;
      }
      // console.log(mergeSortedArray([1,3,2,5,7],[2,4,6,8]));
      console.log(mergeSortedArray2([1, 3, 5, 7], [2, 4, 6]));
      console.log(mergeSortedArray2([1, 3, 5, 7], []));
    </script>
